# 下游兩個服務：LLM 服務 + OpenClaw。
# 一鍵起：  docker compose up -d --build
#
# 注意：whisper 容器與 STT worker 由 AudioFlow app 自動管理，「不」在這個 compose 裡。
# 這份只負責「逐字稿 → 整理」這半段。

services:
  # ── LLM 服務：對外 OpenAI 相容，對內跑 claude -p（訂閱）。不碰任何檔案。 ──
  llm-service:
    build: ./llm-service
    # 以非 root 的 node 使用者執行（claude 拒絕用 root 跑 --dangerously-skip-permissions）
    user: "node"
    # 只綁本機 localhost：讓桌面 app 也能直接呼叫 LLM 整理逐字稿（不靠 openclaw）。
    # 綁 127.0.0.1 而非 0.0.0.0，避免對外網裸開。openclaw 仍走 docker network 容器名連線。
    ports:
      - "127.0.0.1:8088:8088"
    environment:
      # 訂閱 token：由 app 前端設定填入 → 後端把關（沒填就不啟動 LLM）並寫進 .env。
      # 這裡用 :- 預設空字串（而非 :? 強制），讓 compose ps/status 在未填 token 時也不報錯。
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-opus}
      CLAUDE_TIMEOUT_MS: ${CLAUDE_TIMEOUT_MS:-600000}  # claude -p 逾時（毫秒），逾時即殺
      HOME: /home/node          # claude 的設定 / 快取目錄
    restart: unless-stopped
    networks: [audioflow]
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8088/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── 權限初始化：openclaw 以 uid 1000 執行，但 bind mount 的輸出目錄常被 Docker 以
  #    root 自動建立，導致 openclaw 寫不進去。先用 root 把擁有者改成 openclaw 的執行身分，
  #    跑完即退出（openclaw 等它成功後才啟動）。 ──
  init-perms:
    image: busybox
    user: root
    volumes:
      - ${HOME}/openclaw-out:/out        # 整理結果輸出目錄（需可寫）；$HOME 依當前裝置自動帶出
    command: sh -c "chown -R ${HOST_UID:-1000}:${HOST_GID:-1000} /out"
    restart: "no"

  # ── OpenClaw：輪詢逐字稿 → 呼叫 LLM 服務 → 原子化寫出。檔案歸它。 ──
  openclaw:
    build: ./openclaw
    # 以你的 WSL uid:gid 執行，寫出的檔屬於你、不會變 root
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    environment:
      LLM_BASE_URL: http://llm-service:8088/v1   # 同 network，用容器名互連
      LLM_MODEL: ${CLAUDE_MODEL:-opus}
      POLL_INTERVAL: "10"
    volumes:
      - ${HOME}/stt-outbox:/in:ro        # 逐字稿，唯讀（最小權限）；$HOME 依當前裝置自動帶出
      - ${HOME}/openclaw-out:/out        # 整理結果，可寫
    depends_on:
      llm-service:
        condition: service_healthy               # 等 LLM 服務健康才啟動
      init-perms:
        condition: service_completed_successfully # 等權限修好才啟動
    restart: unless-stopped
    networks: [audioflow]

networks:
  audioflow:
    driver: bridge
