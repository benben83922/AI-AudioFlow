# 下游兩個服務：LLM 服務 + OpenClaw。
# 一鍵起：  docker compose up -d --build
#
# 注意：whisper 容器與 STT worker 由 AudioFlow app 自動管理，「不」在這個 compose 裡。
# 這份只負責「逐字稿 → 整理」這半段。

services:
  # ── LLM 服務：對外 OpenAI 相容，對內跑 claude -p（訂閱）。不碰任何檔案。 ──
  llm-service:
    build: ./llm-service
    # 以非 root 的 node 使用者執行（claude 拒絕用 root 跑 --dangerously-skip-permissions）
    user: "node"
    # 只綁本機 localhost：讓桌面 app 也能直接呼叫 LLM 整理逐字稿（不靠 openclaw）。
    # 綁 127.0.0.1 而非 0.0.0.0，避免對外網裸開。openclaw 仍走 docker network 容器名連線。
    ports:
      - "127.0.0.1:8088:8088"
    environment:
      # 訂閱 token：由 app 前端設定填入 → 後端把關（沒填就不啟動 LLM）並寫進 .env。
      # 這裡用 :- 預設空字串（而非 :? 強制），讓 compose ps/status 在未填 token 時也不報錯。
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-opus}
      CLAUDE_TIMEOUT_MS: ${CLAUDE_TIMEOUT_MS:-600000}  # claude -p 逾時（毫秒），逾時即殺
      HOME: /home/node          # claude 的設定 / 快取目錄
    restart: unless-stopped
    networks: [audioflow]
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8088/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── openclaw（+ 只服務於它的 init-perms）已停用：目前不需要自動整理容器，
  #    逐字稿 → 會議紀錄改由 app 的「轉會議紀錄」按鈕（generate_result）觸發。
  #    需要時整段取消註解即可恢復。 ──
  # init-perms:
  #   # 權限初始化：openclaw 以 uid 1000 執行，bind mount 輸出目錄常被 Docker 以 root
  #   # 建立，導致寫不進去。先用 root 改擁有者，跑完即退出（openclaw 等它成功才啟動）。
  #   image: busybox
  #   user: root
  #   volumes:
  #     - ${HOME}/openclaw-out:/out
  #   command: sh -c "chown -R ${HOST_UID:-1000}:${HOST_GID:-1000} /out"
  #   restart: "no"
  #
  # openclaw:
  #   # 輪詢逐字稿 → 呼叫 LLM 服務 → 原子化寫出。
  #   build: ./openclaw
  #   user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
  #   environment:
  #     LLM_BASE_URL: http://llm-service:8088/v1
  #     LLM_MODEL: ${CLAUDE_MODEL:-opus}
  #     POLL_INTERVAL: "10"
  #   volumes:
  #     - ${HOME}/stt-outbox:/in:ro
  #     - ${HOME}/openclaw-out:/out
  #   depends_on:
  #     llm-service:
  #       condition: service_healthy
  #     init-perms:
  #       condition: service_completed_successfully
  #   restart: unless-stopped
  #   networks: [audioflow]

networks:
  audioflow:
    driver: bridge
